version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "GOOGLE_SCRIPT_URL=$GOOGLE_SCRIPT_URL" >> .env.production
        - echo "GUEST_PASSWORD=$GUEST_PASSWORD" >> .env.production
        - echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
